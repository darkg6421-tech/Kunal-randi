      border: 1.5px solid #1a7a55;
      box-shadow: inset 0 4px 8px #00000099, 0 0 12px #1affb1;
      overflow: hidden;

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0f9b6b, #4affb5, #9effe0);
      box-shadow: 0 0 20px #00ffaa;
      border-radius: 40px;
      transition: width 0.2s ease-out;
      position: relative;
    }

    .progress-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(45deg, #ffffff30 0px, #ffffff30 8px, transparent 8px, transparent 16px);
      animation: scan 0.6s linear infinite;
    }

    @keyframes scan {
      0% { background-position: 0 0; }
      100% { background-position: 32px 0; }
    }

    /* console text area */

      border: 1.5px solid #1b6e4a;

<script>
  (function(){
    "use strict";

    // --- elements ---
    const startBtn = document.getElementById('startHackBtn');
    const overlay = document.getElementById('hackOverlay');
    const progressFill = document.getElementById('progressFill');
    const typewriterSpan = document.getElementById('typewriterText');
    const cursorSpan = document.getElementById('cursorSpan');
    const punchlineDiv = document.getElementById('punchlineMsg');
    const typingIndicator = document.getElementById('typingIndicator');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    // --- state ---
    let isHacking = false;
    let typingQueue = [];
    let currentTimeout = null;
    let audioCtx = null;
    
    // typing sound enabled
    let soundEnabled = true;

    // --- Web Audio: short typing "tick" (key press sound) ---
    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        soundEnabled = false;
        console.warn("Web Audio not supported, silent prank");
      }
    }

    function playTypingSound() {
      if (!soundEnabled) return;
      if (!audioCtx) {
        initAudio();
        if (!audioCtx) return;
      }
      // resume if suspended (due to autoplay policies)
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      if (audioCtx.state !== 'running') return;

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'square';
      osc.frequency.value = 440 + Math.random() * 80; // mechanical tick
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(now + 0.06);
    }

    // --- helper: reset overlay to fresh state ---
    function resetOverlay() {
      // clear any ongoing typing
      if (currentTimeout) {
        clearTimeout(currentTimeout);
        currentTimeout = null;
      }
      typewriterSpan.textContent = '';
      punchlineDiv.classList.remove('show');
      progressFill.style.width = '0%';
      typingIndicator.textContent = '⏳ SEQUENCE INITIATED...';
      cursorSpan.style.display = 'inline-block';
    }

    // --- hide overlay and reset ---
    function hideOverlay() {
      overlay.style.display = 'none';
      resetOverlay();
      isHacking = false;
      // optional: close audio context if we want, but not necessary
    }

    // --- show overlay ---
    function showOverlay() {
      overlay.style.display = 'flex';
      resetOverlay();
    }

    // --- typing effect with progress and sound ---
    function typeText(element, text, speed = 50, onChar, onComplete) {
      let i = 0;
      element.textContent = '';
      
      function typeNext() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          if (onChar) onChar(i, text.charAt(i));
          playTypingSound();   // <-- TYPING SOUND on each char
          i++;
          currentTimeout = setTimeout(typeNext, speed);
        } else {
          currentTimeout = null;
          if (onComplete) onComplete();
        }
      }
      typeNext();
    }

    // --- orchestrate the prank sequence ---
    function startHackSequence() {
      if (isHacking) return;
      isHacking = true;
      
      // initialize audio context on first user interaction
      initAudio();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      showOverlay();
      
      // We'll type 3 lines sequentially + progress updates
      const lines = [
        { text: '> Accessing your data...', progress: 28 },
        { text: '> Photos found... (DCIM, WhatsApp)', progress: 58 },
        { text: '> Sending to FBI :: encrypted stream...', progress: 100 }
      ];
      
      let lineIndex = 0;
      
      // update progress helper
      function setProgress(percent) {
        progressFill.style.width = Math.min(percent, 100) + '%';
      }
      
      function typeNextLine() {
        if (lineIndex >= lines.length) {
          // all lines done -> show punchline
          typingIndicator.textContent = '⚠️ UPLINK COMPLETE · DECRYPTING...';
          cursorSpan.style.display = 'none'; // hide cursor before punchline
          
          setTimeout(() => {
            punchlineDiv.classList.add('show');
            typingIndicator.textContent = '🎭 PRANK COMPLETE · "Relax bro!"';
            // keep progress at 100%
            setProgress(100);
            isHacking = false; // sequence finished
          }, 450);
          return;
        }
        
        const line = lines[lineIndex];
        typingIndicator.textContent = `⏳ EXECUTING PHASE ${lineIndex+1}/3 ...`;
        
        // set progress before typing (smooth)
        setProgress(line.progress - 8 > 0 ? line.progress - 8 : 0);
        
        typeText(
          typewriterSpan, 
          line.text, 
          45, // speed per char
          (idx, char) => {
            // gradually increase progress while typing (makes it look active)
            const extra = (idx / line.text.length) * 10;
            setProgress(Math.min(line.progress, (line.progress - 10 + extra)));
          },
          () => {
            // after line finished
            setProgress(line.progress);
            
            // small pause before next line
            lineIndex++;
            if (lineIndex < lines.length) {
              currentTimeout = setTimeout(() => {
                // before next line, add newline effect (we keep text, we append newline)
                typewriterSpan.textContent += '\n';
                typeNextLine();
              }, 500);
            } else {
              // last line done, add newline then finalize
              typewriterSpan.textContent += '\n';
              currentTimeout = setTimeout(() => {
                typeNextLine(); // will trigger punchline
              }, 300);
            }
          }
        );
      }
      
      // start typing first line
      typeNextLine();
    }

    // --- close overlay manually (refresh/reset) ---
    function refreshPrank() {
      if (currentTimeout) {
        clearTimeout(currentTimeout);
        currentTimeout = null;
      }
      hideOverlay();
      // reset main page state
      isHacking = false;
    }

    // --- event listeners ---
    startBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (isHacking) return;
      startHackSequence();
    });

    closeOverlayBtn.addEventListener('click', () => {
      refreshPrank();
    });

    // Also allow clicking the fake [X] to close (for convenience)
    document.querySelector('.fake-close').addEventListener('click', () => {
      refreshPrank();
    });

    // Prevent accidental overlay click dismissal? we keep it, but only via buttons.
    // If user clicks on overlay background, we do nothing (intentional)
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        // optional: could also close, but we'll ignore to keep prank alive
        // uncomment next line if you want click outside to close:
        // refreshPrank();
      }
    });

    // Extra cool: keyboard escape to close (but we don't want accidental)
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.style.display === 'flex') {
        refreshPrank();
      }
    });

    // Initialize audio on first touch/click (already done in start)
    // Also pre-warm audio context on button hover? not needed.

    // Enhance: if audio context is blocked, we still work without sound.
    // For extra "male website" feel? The UI is soft & high-end.

    // Add a subtle typing sound indicator: already present.

    // For better mobile, ensure audio context resumes.
    // When overlay is closed, we don't need to close audio.
    
    // handle if user spams button
    startBtn.addEventListener('touchstart', (e) => {
      // just to make sure audio init on mobile
      initAudio();
    }, { passive: true });

    // fallback for browsers that need user gesture for AudioContext
    function ensureAudioUnlocked() {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }
    document.body.addEventListener('click', ensureAudioUnlocked, { once: true });
    
    console.log('💀 PRANK READY · "System Hacked" fake screen with typing sound & progress');
  })();
</script>
